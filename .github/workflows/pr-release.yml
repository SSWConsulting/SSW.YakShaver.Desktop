name: PR Pre-release

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: write
  pull-requests: write

env:
  APP_NAME: SSW.YakShaver
  NODE_VERSION: 20

concurrency:
  group: pr-pre-release-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  cleanup-release:
    if: |
      github.event_name != 'pull_request' ||
      github.event.action != 'closed'
    runs-on: ubuntu-latest
    outputs:
      pr_number: ${{ steps.pr_info.outputs.pr_number }}
      release_tag: ${{ steps.pr_info.outputs.tag }}
      channel: ${{ steps.pr_info.outputs.channel }}
      version: ${{ steps.pr_info.outputs.version }}
      pr_sha: ${{ steps.pr_info.outputs.pr_sha }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Get PR info
        id: pr_info
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          PR_SHA="${{ github.event.pull_request.head.sha || github.sha }}"
          SHORT_SHA="${PR_SHA:0:7}"
          BUILD_TIMESTAMP=$(date +%s)
          BASE_VERSION=$(node -p 'require("./package.json").version.split("-")[0]')
          CHANNEL_NAME="beta.${PR_NUMBER}"
          PRE_RELEASE_VERSION="${BASE_VERSION}-${CHANNEL_NAME}.${BUILD_TIMESTAMP}"
          TAG_NAME="${PRE_RELEASE_VERSION}"
          echo "tag=${TAG_NAME}" >> $GITHUB_OUTPUT
          echo "pr_number=${PR_NUMBER}" >> $GITHUB_OUTPUT
          echo "channel=${CHANNEL_NAME}" >> $GITHUB_OUTPUT
          echo "version=${PRE_RELEASE_VERSION}" >> $GITHUB_OUTPUT
          echo "pr_sha=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "PR: ${PR_NUMBER}, Tag: ${TAG_NAME}, Channel: ${CHANNEL_NAME}, Version: ${PRE_RELEASE_VERSION}"

      - name: Delete existing PR releases
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ steps.pr_info.outputs.pr_number }}"

          echo "Finding and deleting existing releases for PR #${PR_NUMBER}"

          # Collect both release IDs and tag names BEFORE deleting anything
          RELEASES_DATA=$(gh api --paginate /repos/${{ github.repository }}/releases --jq ".[] | select(.body | contains(\"PR #${PR_NUMBER}\")) | {id: .id, tag: .tag_name}")

          RELEASE_IDS=$(echo "$RELEASES_DATA" | jq -r '.id')
          TAG_NAMES=$(echo "$RELEASES_DATA" | jq -r '.tag')

          # Now delete the releases
          for id in $RELEASE_IDS; do
            if [ -n "$id" ]; then
              echo "Deleting release ID: $id"
              gh api -X DELETE /repos/${{ github.repository }}/releases/$id || true
            fi
          done

          # Clean up associated tags (collected before deletion)
          for tag in $TAG_NAMES; do
            if [ -n "$tag" ]; then
              echo "Deleting tag: $tag"
              gh api -X DELETE /repos/${{ github.repository }}/git/refs/tags/$tag || true
            fi
          done

          echo "Cleanup completed"

  build-windows:
    needs: cleanup-release
    if: |
      github.event_name != 'pull_request' ||
      github.event.action != 'closed'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      # TODO: Remove this step once this PBI is done: https://github.com/SSWConsulting/SSW.YakShaver/issues/3095
      - name: Create .env from secrets
        shell: pwsh
        env:
          MCP_CALLBACK_PORT: 8090
          MCP_AUTH_TIMEOUT_MS: 60000
          PORTAL_API_URL: https://api-staging.yakshaver.ai/api
          PORTAL_TENANTS_URL: https://api-staging.yakshaver.ai/tenants
          AZURE_ENTRA_APP_CLIENT_ID: ${{ secrets.AZURE_ENTRA_APP_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_AUTH_SCOPE: ${{ secrets.AZURE_AUTH_SCOPE }}
          AZURE_AUTH_CUSTOM_PROTOCOL: yakshaver-desktop
          IDENTITY_SERVER_URL: https://app-ssw-ident-staging-api.azurewebsites.net
          IDENTITY_SERVER_CLIENT_ID: ${{ secrets.IDENTITY_SERVER_CLIENT_ID }}
          IDENTITY_SERVER_SCOPE: ${{ secrets.IDENTITY_SERVER_SCOPE }}
          IDENTITY_SERVER_CUSTOM_PROTOCOL: yakshaver-desktop
          APPLICATIONINSIGHTS_CONNECTION_STRING: ${{ secrets.APPLICATIONINSIGHTS_CONNECTION_STRING }}
        run: |
          Add-Content -Path ".env" -Value "`nMCP_CALLBACK_PORT=$env:MCP_CALLBACK_PORT"
          Add-Content -Path ".env" -Value "`nMCP_AUTH_TIMEOUT_MS=$env:MCP_AUTH_TIMEOUT_MS"
          Add-Content -Path ".env" -Value "`nPORTAL_API_URL=$env:PORTAL_API_URL"
          Add-Content -Path ".env" -Value "`nPORTAL_TENANTS_URL=$env:PORTAL_TENANTS_URL"
          Add-Content -Path ".env" -Value "`nAZURE_ENTRA_APP_CLIENT_ID=$env:AZURE_ENTRA_APP_CLIENT_ID"
          Add-Content -Path ".env" -Value "`nAZURE_TENANT_ID=$env:AZURE_TENANT_ID"
          Add-Content -Path ".env" -Value "`nAZURE_AUTH_SCOPE=$env:AZURE_AUTH_SCOPE"
          Add-Content -Path ".env" -Value "`nAZURE_AUTH_CUSTOM_PROTOCOL=$env:AZURE_AUTH_CUSTOM_PROTOCOL"
          Add-Content -Path ".env" -Value "`nIDENTITY_SERVER_URL=$env:IDENTITY_SERVER_URL"
          Add-Content -Path ".env" -Value "`nIDENTITY_SERVER_CLIENT_ID=$env:IDENTITY_SERVER_CLIENT_ID"
          Add-Content -Path ".env" -Value "`nIDENTITY_SERVER_SCOPE=$env:IDENTITY_SERVER_SCOPE"
          Add-Content -Path ".env" -Value "`nIDENTITY_SERVER_CUSTOM_PROTOCOL=$env:IDENTITY_SERVER_CUSTOM_PROTOCOL"
          Add-Content -Path ".env" -Value "`nAPPLICATIONINSIGHTS_CONNECTION_STRING=$env:APPLICATIONINSIGHTS_CONNECTION_STRING"
          $COMMIT_HASH = git rev-parse HEAD
          Add-Content -Path ".env" -Value "`nCOMMIT_HASH=$COMMIT_HASH"

      - name: Install dependencies
        run: npm ci --prefer-offline
        env:
          # Prevent youtube-dl-exec from auto-downloading yt-dlp during npm install, which would hit the GitHub API unauthenticated rate limit
          YOUTUBE_DL_SKIP_DOWNLOAD: true

      # Manual download is needed because the 'youtube-dl-exec' script hits the GitHub API unauthenticated rate limit (60/hr) when attempting to download the binary
      - name: Install yt-dlp binary manually
        shell: bash
        run: |
          mkdir -p node_modules/youtube-dl-exec/bin
          PATTERN="yt-dlp.exe"
          OUTPUT_FILE="node_modules/youtube-dl-exec/bin/yt-dlp.exe"
          MAX_ATTEMPTS=3
          ATTEMPT=1

          until gh release download --repo yt-dlp/yt-dlp --pattern "$PATTERN" --clobber --output "$OUTPUT_FILE"; do
            echo "Attempt $ATTEMPT to download yt-dlp binary failed." >&2
            if [ $ATTEMPT -ge $MAX_ATTEMPTS ]; then exit 1; fi
            ATTEMPT=$((ATTEMPT+1))
            sleep 5
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install UI dependencies
        run: npm ci --prefer-offline
        working-directory: src/ui

      - name: Update version for pre-release
        shell: pwsh
        run: |
          $version = "${{ needs.cleanup-release.outputs.version }}"
          if (-not $version) {
            throw "Missing version output"
          }
          npm version $version --no-git-tag-version

      - name: Publish Windows pre-release
        run: npm run publish -- --win --publish never
        env:
          NODE_ENV: production
          CI: true
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CHANNEL: ${{ needs.cleanup-release.outputs.channel }}
          # Disable minification for PR preview builds
          VITE_DEBUG_BUILD: "true"

      - name: Fix update manifest filenames
        shell: pwsh
        run: |
          Get-ChildItem "build/*.yml" | ForEach-Object {
            $content = Get-Content $_.FullName -Raw
            $content = $content -replace "YakShaver-Setup-", "YakShaver.Setup."
            $content | Out-File -FilePath $_.FullName -Encoding utf8 -NoNewline
            Write-Host "Fixed $($_.Name)"
          }

      - name: Verify Windows update manifest
        shell: pwsh
        run: |
          $channel = "${{ needs.cleanup-release.outputs.channel }}"
          $manifest = "build/$channel.yml"

          if (-not (Test-Path $manifest)) {
            Write-Host "Available YAML files:"
            Get-ChildItem "build/*.yml" | ForEach-Object { Write-Host "  $($_.Name)" }
            throw "Missing Windows update manifest: $manifest"
          }

          if (Get-ChildItem "build/*-mac.yml" -ErrorAction SilentlyContinue) {
            throw "Windows build must not produce macOS update manifests"
          }

          $content = Get-Content $manifest -Raw
          if ($content -notmatch "\.exe") {
            throw "Windows update manifest must reference the Windows installer"
          }

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v7
        with:
          name: windows-build
          path: |
            build/*.yml
            build/YakShaver*Setup*.exe
            build/YakShaver*Setup*.exe.blockmap
          retention-days: 1

  build-macos-arm64:
    needs: cleanup-release
    if: |
      github.event_name != 'pull_request' ||
      github.event.action != 'closed'
    runs-on: macos-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      # TODO: Remove this step once this PBI is done: https://github.com/SSWConsulting/SSW.YakShaver/issues/3095
      - name: Create .env from secrets
        env:
          MCP_CALLBACK_PORT: 8090
          MCP_AUTH_TIMEOUT_MS: 60000
          PORTAL_API_URL: https://api-staging.yakshaver.ai/api
          PORTAL_TENANTS_URL: https://api-staging.yakshaver.ai/tenants
          AZURE_ENTRA_APP_CLIENT_ID: ${{ secrets.AZURE_ENTRA_APP_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_AUTH_SCOPE: ${{ secrets.AZURE_AUTH_SCOPE }}
          AZURE_AUTH_CUSTOM_PROTOCOL: yakshaver-desktop
          IDENTITY_SERVER_URL: https://app-ssw-ident-staging-api.azurewebsites.net
          IDENTITY_SERVER_CLIENT_ID: ${{ secrets.IDENTITY_SERVER_CLIENT_ID }}
          IDENTITY_SERVER_SCOPE: ${{ secrets.IDENTITY_SERVER_SCOPE }}
          IDENTITY_SERVER_CUSTOM_PROTOCOL: yakshaver-desktop
          APPLICATIONINSIGHTS_CONNECTION_STRING: ${{ secrets.APPLICATIONINSIGHTS_CONNECTION_STRING }}
        run: |
          printf "MCP_CALLBACK_PORT=%s\n" "$MCP_CALLBACK_PORT" >> .env
          printf "MCP_AUTH_TIMEOUT_MS=%s\n" "$MCP_AUTH_TIMEOUT_MS" >> .env
          printf "PORTAL_API_URL=%s\n" "$PORTAL_API_URL" >> .env
          printf "PORTAL_TENANTS_URL=%s\n" "$PORTAL_TENANTS_URL" >> .env
          printf "AZURE_ENTRA_APP_CLIENT_ID=%s\n" "$AZURE_ENTRA_APP_CLIENT_ID" >> .env
          printf "AZURE_TENANT_ID=%s\n" "$AZURE_TENANT_ID" >> .env
          printf "AZURE_AUTH_SCOPE=%s\n" "$AZURE_AUTH_SCOPE" >> .env
          printf "AZURE_AUTH_CUSTOM_PROTOCOL=%s\n" "$AZURE_AUTH_CUSTOM_PROTOCOL" >> .env
          printf "IDENTITY_SERVER_URL=%s\n" "$IDENTITY_SERVER_URL" >> .env
          printf "IDENTITY_SERVER_CLIENT_ID=%s\n" "$IDENTITY_SERVER_CLIENT_ID" >> .env
          printf "IDENTITY_SERVER_SCOPE=%s\n" "$IDENTITY_SERVER_SCOPE" >> .env
          printf "IDENTITY_SERVER_CUSTOM_PROTOCOL=%s\n" "$IDENTITY_SERVER_CUSTOM_PROTOCOL" >> .env
          printf "APPLICATIONINSIGHTS_CONNECTION_STRING=%s\n" "$APPLICATIONINSIGHTS_CONNECTION_STRING" >> .env

      - name: Install dependencies
        run: npm ci --prefer-offline
        env:
          YOUTUBE_DL_SKIP_DOWNLOAD: true

      # Manual download is needed because the youtube-dl-exec script hits the GitHub API unauthenticated rate limit (60/hr) while attempting to find the yt-dlp binary.
      - name: Install yt-dlp binary manually
        run: |
          mkdir -p node_modules/youtube-dl-exec/bin

          PATTERN="yt-dlp_macos"
          OUTPUT_FILE="node_modules/youtube-dl-exec/bin/yt-dlp"
          MAX_ATTEMPTS=3
          ATTEMPT=1

          until gh release download \
            --repo yt-dlp/yt-dlp \
            --pattern "$PATTERN" \
            --clobber \
            --output "$OUTPUT_FILE"; do

            echo "Attempt $ATTEMPT to download yt-dlp binary failed." >&2

            if [ $ATTEMPT -ge $MAX_ATTEMPTS ]; then
              echo "Failed to download yt-dlp binary after $MAX_ATTEMPTS attempts." >&2
              exit 1
            fi

            ATTEMPT=$((ATTEMPT+1))
            sleep 5
          done

          # Make the binary executable
          chmod +x "$OUTPUT_FILE"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install UI dependencies
        run: npm ci --prefer-offline
        working-directory: src/ui

      - name: Update version for pre-release
        run: |
          VERSION="${{ needs.cleanup-release.outputs.version }}"
          if [[ -z "$VERSION" ]]; then
            echo "Missing version output"
            exit 1
          fi
          npm version "$VERSION" --no-git-tag-version

      - name: Publish macOS pre-release (arm64)
        run: npm run publish -- --mac --arm64 -c.mac.target.arch=arm64 -c.mac.artifactName='${productName}-${version}-${arch}-mac.${ext}' --publish never
        env:
          NODE_ENV: production
          CI: true
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CHANNEL: ${{ needs.cleanup-release.outputs.channel }}
          # Disable minification for PR preview builds
          VITE_DEBUG_BUILD: "true"

      # Enable only when need code sign and notarization on Pre-release builds
      # - name: Publish macOS pre-release
      #   run: npm run publish -- --mac
      #   env:
      #     NODE_ENV: production
      #     CI: true
      #     GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      #     CHANNEL: ${{ needs.cleanup-release.outputs.channel }}
      #     # Disable minification for PR preview builds
      #     VITE_DEBUG_BUILD: "true"
      #     CSC_FOR_PULL_REQUEST: "true"
      #     CSC_LINK: ${{ secrets.CSC_LINK }}
      #     CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
      #     APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      #     APPLE_ID: ${{ secrets.APPLE_ID }}
      #     APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload macOS (arm64) artifacts
        uses: actions/upload-artifact@v7
        with:
          name: macos-arm64-build
          path: |
            build/YakShaver-*-arm64-mac.zip
            build/YakShaver-*-arm64-mac.zip.blockmap
            build/*-mac.yml
          retention-days: 1

  build-macos-x64:
    needs: cleanup-release
    if: |
      github.event_name != 'pull_request' ||
      github.event.action != 'closed'
    runs-on: macos-15-intel
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      # TODO: Remove this step once this PBI is done: https://github.com/SSWConsulting/SSW.YakShaver/issues/3095
      - name: Create .env from secrets
        env:
          MCP_CALLBACK_PORT: 8090
          MCP_AUTH_TIMEOUT_MS: 60000
          PORTAL_API_URL: https://api-staging.yakshaver.ai/api
          PORTAL_TENANTS_URL: https://api-staging.yakshaver.ai/tenants
          AZURE_ENTRA_APP_CLIENT_ID: ${{ secrets.AZURE_ENTRA_APP_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_AUTH_SCOPE: ${{ secrets.AZURE_AUTH_SCOPE }}
          AZURE_AUTH_CUSTOM_PROTOCOL: yakshaver-desktop
          IDENTITY_SERVER_URL: https://app-ssw-ident-staging-api.azurewebsites.net
          IDENTITY_SERVER_CLIENT_ID: ${{ secrets.IDENTITY_SERVER_CLIENT_ID }}
          IDENTITY_SERVER_SCOPE: ${{ secrets.IDENTITY_SERVER_SCOPE }}
          IDENTITY_SERVER_CUSTOM_PROTOCOL: yakshaver-desktop
          APPLICATIONINSIGHTS_CONNECTION_STRING: ${{ secrets.APPLICATIONINSIGHTS_CONNECTION_STRING }}
        run: |
          printf "MCP_CALLBACK_PORT=%s\n" "$MCP_CALLBACK_PORT" >> .env
          printf "MCP_AUTH_TIMEOUT_MS=%s\n" "$MCP_AUTH_TIMEOUT_MS" >> .env
          printf "PORTAL_API_URL=%s\n" "$PORTAL_API_URL" >> .env
          printf "PORTAL_TENANTS_URL=%s\n" "$PORTAL_TENANTS_URL" >> .env
          printf "AZURE_ENTRA_APP_CLIENT_ID=%s\n" "$AZURE_ENTRA_APP_CLIENT_ID" >> .env
          printf "AZURE_TENANT_ID=%s\n" "$AZURE_TENANT_ID" >> .env
          printf "AZURE_AUTH_SCOPE=%s\n" "$AZURE_AUTH_SCOPE" >> .env
          printf "AZURE_AUTH_CUSTOM_PROTOCOL=%s\n" "$AZURE_AUTH_CUSTOM_PROTOCOL" >> .env
          printf "IDENTITY_SERVER_URL=%s\n" "$IDENTITY_SERVER_URL" >> .env
          printf "IDENTITY_SERVER_CLIENT_ID=%s\n" "$IDENTITY_SERVER_CLIENT_ID" >> .env
          printf "IDENTITY_SERVER_SCOPE=%s\n" "$IDENTITY_SERVER_SCOPE" >> .env
          printf "IDENTITY_SERVER_CUSTOM_PROTOCOL=%s\n" "$IDENTITY_SERVER_CUSTOM_PROTOCOL" >> .env
          printf "APPLICATIONINSIGHTS_CONNECTION_STRING=%s\n" "$APPLICATIONINSIGHTS_CONNECTION_STRING" >> .env

      - name: Install dependencies
        run: npm ci --prefer-offline
        env:
          YOUTUBE_DL_SKIP_DOWNLOAD: true
          # Explicitly set arch to x64 to ensure all optional dependencies install x64 binaries
          npm_config_arch: x64

      # Explicitly rebuild better-sqlite3 for x64 Electron to guarantee correct native module architecture
      - name: Rebuild native modules for x64
        run: npx electron-rebuild -f -w better-sqlite3 --arch x64

      # Manual download is needed because the youtube-dl-exec script hits the GitHub API unauthenticated rate limit (60/hr) while attempting to find the yt-dlp binary.
      - name: Install yt-dlp binary manually
        run: |
          mkdir -p node_modules/youtube-dl-exec/bin

          PATTERN="yt-dlp_macos"
          OUTPUT_FILE="node_modules/youtube-dl-exec/bin/yt-dlp"
          MAX_ATTEMPTS=3
          ATTEMPT=1

          until gh release download \
            --repo yt-dlp/yt-dlp \
            --pattern "$PATTERN" \
            --clobber \
            --output "$OUTPUT_FILE"; do

            echo "Attempt $ATTEMPT to download yt-dlp binary failed." >&2

            if [ $ATTEMPT -ge $MAX_ATTEMPTS ]; then
              echo "Failed to download yt-dlp binary after $MAX_ATTEMPTS attempts." >&2
              exit 1
            fi

            ATTEMPT=$((ATTEMPT+1))
            sleep 5
          done

          # Make the binary executable
          chmod +x "$OUTPUT_FILE"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install UI dependencies
        run: npm ci --prefer-offline
        working-directory: src/ui

      - name: Update version for pre-release
        run: |
          VERSION="${{ needs.cleanup-release.outputs.version }}"
          if [[ -z "$VERSION" ]]; then
            echo "Missing version output"
            exit 1
          fi
          npm version "$VERSION" --no-git-tag-version

      - name: Publish macOS pre-release (x64)
        run: npm run publish -- --mac --x64 -c.mac.target.arch=x64 -c.mac.artifactName='${productName}-${version}-${arch}-mac.${ext}' --publish never
        env:
          NODE_ENV: production
          CI: true
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CHANNEL: ${{ needs.cleanup-release.outputs.channel }}
          # Disable minification for PR preview builds
          VITE_DEBUG_BUILD: "true"

      - name: Verify x64 architecture of built app
        run: |
          set -e
          echo "Verifying built app architecture..."

          # Find the .app bundle
          APP_PATH=$(find build/mac-x64 build/mac -name "YakShaver.app" -type d 2>/dev/null | head -n 1)
          if [[ -z "$APP_PATH" ]]; then
            echo "Warning: Could not find .app bundle to verify architecture"
            echo "Build directory contents:"
            ls -la build/ 2>/dev/null || echo "No build directory"
          else
            BINARY="$APP_PATH/Contents/MacOS/YakShaver"
            if [[ -f "$BINARY" ]]; then
              ARCH_INFO=$(file "$BINARY")
              echo "Binary architecture: $ARCH_INFO"
              if echo "$ARCH_INFO" | grep -q "x86_64"; then
                echo "✅ Confirmed: Binary is x86_64 (Intel)"
              else
                echo "❌ ERROR: Binary is NOT x86_64!"
                echo "$ARCH_INFO"
                exit 1
              fi
            fi
          fi

          # Also verify better-sqlite3 native module if accessible
          SQLITE_NODE=$(find build -name "better_sqlite3.node" -type f 2>/dev/null | head -n 1)
          if [[ -n "$SQLITE_NODE" ]]; then
            SQLITE_ARCH=$(file "$SQLITE_NODE")
            echo "better-sqlite3 native module: $SQLITE_ARCH"
            if echo "$SQLITE_ARCH" | grep -q "x86_64"; then
              echo "✅ Confirmed: better-sqlite3 native module is x86_64"
            else
              echo "❌ ERROR: better-sqlite3 native module is NOT x86_64!"
              echo "$SQLITE_ARCH"
              exit 1
            fi
          fi

      - name: Upload macOS (x64) artifacts
        uses: actions/upload-artifact@v7
        with:
          name: macos-x64-build
          path: |
            build/YakShaver-*-x64-mac.zip
            build/YakShaver-*-x64-mac.zip.blockmap
            build/*-mac.yml
          retention-days: 1

  create-and-comment-release:
    runs-on: ubuntu-latest
    needs:
      - cleanup-release
      - build-windows
      - build-macos-arm64
      - build-macos-x64
    if: |
      github.event.action != 'closed' &&
      needs.cleanup-release.outputs.pr_number != ''
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install manifest merge dependencies
        run: npm ci --ignore-scripts --prefer-offline
        env:
          YOUTUBE_DL_SKIP_DOWNLOAD: true

      - name: Download Windows artifacts
        uses: actions/download-artifact@v8
        with:
          name: windows-build
          path: artifacts/windows/

      - name: Download macOS (arm64) artifacts
        uses: actions/download-artifact@v8
        with:
          name: macos-arm64-build
          path: artifacts/macos-arm64/

      - name: Download macOS (x64) artifacts
        uses: actions/download-artifact@v8
        with:
          name: macos-x64-build
          path: artifacts/macos-x64/

      - name: Prepare release artifacts
        run: |
          set -euo pipefail

          CHANNEL="${{ needs.cleanup-release.outputs.channel }}"
          mkdir -p release-artifacts

          find artifacts/windows -maxdepth 1 -type f -exec cp {} release-artifacts/ \;

          WINDOWS_MANIFEST="release-artifacts/${CHANNEL}.yml"
          if [[ ! -f "$WINDOWS_MANIFEST" ]]; then
            echo "Missing Windows update manifest: $WINDOWS_MANIFEST" >&2
            find release-artifacts -maxdepth 1 -type f -name "*.yml" -print >&2
            exit 1
          fi

          if ! grep -q "\.exe" "$WINDOWS_MANIFEST"; then
            echo "Windows update manifest must reference the Windows installer" >&2
            exit 1
          fi

          ARM64_MANIFEST=$(find artifacts/macos-arm64 -name "*-mac.yml" -type f | head -n 1)
          X64_MANIFEST=$(find artifacts/macos-x64 -name "*-mac.yml" -type f | head -n 1)

          if [[ -z "$ARM64_MANIFEST" || -z "$X64_MANIFEST" ]]; then
            echo "Missing macOS update manifest artifacts" >&2
            find artifacts -type f -name "*.yml" -print >&2
            exit 1
          fi

          node scripts/merge-mac-update-manifests.js \
            --arm64 "$ARM64_MANIFEST" \
            --x64 "$X64_MANIFEST" \
            --output "release-artifacts/${CHANNEL}-mac.yml"

          find artifacts/macos-arm64 artifacts/macos-x64 \
            \( -name "YakShaver-*-mac.zip" -o -name "YakShaver-*-mac.zip.blockmap" \) \
            -exec cp {} release-artifacts/ \;

          MAC_ZIP_COUNT=$(find release-artifacts -maxdepth 1 -name "YakShaver-*-mac.zip" | wc -l | tr -d ' ')
          if [[ "$MAC_ZIP_COUNT" -ne 2 ]]; then
            echo "Expected exactly two macOS ZIP artifacts; found $MAC_ZIP_COUNT" >&2
            find release-artifacts -maxdepth 1 -name "YakShaver-*-mac.zip" -print >&2
            exit 1
          fi

          MAC_BLOCKMAP_COUNT=$(find release-artifacts -maxdepth 1 -name "YakShaver-*-mac.zip.blockmap" | wc -l | tr -d ' ')
          if [[ "$MAC_BLOCKMAP_COUNT" -ne 2 ]]; then
            echo "Expected exactly two macOS ZIP blockmaps; found $MAC_BLOCKMAP_COUNT" >&2
            find release-artifacts -maxdepth 1 -name "YakShaver-*-mac.zip.blockmap" -print >&2
            exit 1
          fi

          MAC_MANIFEST_COUNT=$(find release-artifacts -maxdepth 1 -name "*-mac.yml" | wc -l | tr -d ' ')
          if [[ "$MAC_MANIFEST_COUNT" -ne 1 ]]; then
            echo "Expected exactly one macOS update manifest; found $MAC_MANIFEST_COUNT" >&2
            find release-artifacts -maxdepth 1 -name "*-mac.yml" -print >&2
            exit 1
          fi

      - name: Create single GitHub release with all artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.cleanup-release.outputs.release_tag }}
          name: "Pre-release PR #${{ needs.cleanup-release.outputs.pr_number }} (${{ needs.cleanup-release.outputs.pr_sha }})"
          body: |
            Pre-release build for PR #${{ needs.cleanup-release.outputs.pr_number }}

            Commit: ${{ needs.cleanup-release.outputs.pr_sha }}
            PR: ${{ github.event.pull_request.html_url || 'N/A' }}

            This is an automated pre-release. It will be updated automatically when new commits are pushed to the PR.
          prerelease: true
          files: release-artifacts/**/*
          draft: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment release link on PR
        uses: peter-evans/create-or-update-comment@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ needs.cleanup-release.outputs.pr_number }}
          body: |
            🚀 Pre-release build is available for this PR:
            https://github.com/${{ github.repository }}/releases/tag/${{ needs.cleanup-release.outputs.release_tag }}

  delete-release:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request' &&
      github.event.action == 'closed'
    steps:
      - name: Delete PR pre-releases
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"

          echo "Deleting all releases for closed PR #${PR_NUMBER}"

          # Collect both release IDs and tag names BEFORE deleting anything
          RELEASES_DATA=$(gh api --paginate /repos/${{ github.repository }}/releases --jq ".[] | select(.body | contains(\"PR #${PR_NUMBER}\")) | {id: .id, tag: .tag_name}")

          RELEASE_IDS=$(echo "$RELEASES_DATA" | jq -r '.id')
          TAG_NAMES=$(echo "$RELEASES_DATA" | jq -r '.tag')

          # Delete the releases
          for id in $RELEASE_IDS; do
            if [ -n "$id" ]; then
              echo "Deleting release ID: $id"
              gh api -X DELETE /repos/${{ github.repository }}/releases/$id || true
            fi
          done

          # Clean up associated tags (collected before deletion)
          for tag in $TAG_NAMES; do
            if [ -n "$tag" ]; then
              echo "Deleting tag: $tag"
              gh api -X DELETE /repos/${{ github.repository }}/git/refs/tags/$tag || true
            fi
          done

          echo "Deletion completed for closed PR"
