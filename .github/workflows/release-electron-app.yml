name: Release Electron App

# Keep the `release` trigger option to allow manual publishing of releases if needed.
on:
  release:
    types: [published]
  workflow_call:
    inputs:
      tag_name:
        description: "The release tag name"
        required: true
        type: string
      target:
        description: "The target branch for the release"
        required: true
        type: string

permissions:
  contents: write

env:
  APP_NAME: SSW.YakShaver
  NODE_VERSION: 20

jobs:
  check-release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.check.outputs.version }}
      target: ${{ steps.check.outputs.target }}
    steps:
      - id: check
        run: |
          if [ -n "${{ inputs.tag_name }}" ]; then
            TAG="${{ inputs.tag_name }}"
            TARGET="${{ inputs.target }}"
          else
            TAG="${{ github.event.release.tag_name }}"
            TARGET="${{ github.event.release.target_commitish }}"
          fi

          echo "version=$TAG" >> $GITHUB_OUTPUT
          echo "target=$TARGET" >> $GITHUB_OUTPUT

  build-windows:
    needs: check-release
    runs-on: windows-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.check-release.outputs.target }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Create .env from secrets
        shell: pwsh
        env:
          MCP_CALLBACK_PORT: 8090
          MCP_AUTH_TIMEOUT_MS: 60000
          PORTAL_API_URL: https://api.yakshaver.ai/api
          PORTAL_TENANTS_URL: https://api.yakshaver.ai/tenants
          AZURE_ENTRA_APP_CLIENT_ID: ${{ secrets.AZURE_ENTRA_APP_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_AUTH_SCOPE: ${{ secrets.AZURE_AUTH_SCOPE }}
          AZURE_AUTH_CUSTOM_PROTOCOL: yakshaver-desktop
          IDENTITY_SERVER_URL: https://identity.ssw.com.au/
          IDENTITY_SERVER_CLIENT_ID: ${{ secrets.IDENTITY_SERVER_CLIENT_ID }}
          IDENTITY_SERVER_SCOPE: ${{ secrets.IDENTITY_SERVER_SCOPE }}
          IDENTITY_SERVER_CUSTOM_PROTOCOL: yakshaver-desktop
          APPLICATIONINSIGHTS_CONNECTION_STRING: ${{ secrets.APPLICATIONINSIGHTS_CONNECTION_STRING }}
        run: |
          Add-Content -Path ".env" -Value "`nMCP_CALLBACK_PORT=$env:MCP_CALLBACK_PORT"
          Add-Content -Path ".env" -Value "`nMCP_AUTH_TIMEOUT_MS=$env:MCP_AUTH_TIMEOUT_MS"
          Add-Content -Path ".env" -Value "`nPORTAL_API_URL=$env:PORTAL_API_URL"
          Add-Content -Path ".env" -Value "`nPORTAL_TENANTS_URL=$env:PORTAL_TENANTS_URL"
          Add-Content -Path ".env" -Value "`nAZURE_ENTRA_APP_CLIENT_ID=$env:AZURE_ENTRA_APP_CLIENT_ID"
          Add-Content -Path ".env" -Value "`nAZURE_TENANT_ID=$env:AZURE_TENANT_ID"
          Add-Content -Path ".env" -Value "`nAZURE_AUTH_SCOPE=$env:AZURE_AUTH_SCOPE"
          Add-Content -Path ".env" -Value "`nAZURE_AUTH_CUSTOM_PROTOCOL=$env:AZURE_AUTH_CUSTOM_PROTOCOL"
          Add-Content -Path ".env" -Value "`nIDENTITY_SERVER_URL=$env:IDENTITY_SERVER_URL"
          Add-Content -Path ".env" -Value "`nIDENTITY_SERVER_CLIENT_ID=$env:IDENTITY_SERVER_CLIENT_ID"
          Add-Content -Path ".env" -Value "`nIDENTITY_SERVER_SCOPE=$env:IDENTITY_SERVER_SCOPE"
          Add-Content -Path ".env" -Value "`nIDENTITY_SERVER_CUSTOM_PROTOCOL=$env:IDENTITY_SERVER_CUSTOM_PROTOCOL"
          Add-Content -Path ".env" -Value "`nAPPLICATIONINSIGHTS_CONNECTION_STRING=$env:APPLICATIONINSIGHTS_CONNECTION_STRING"
          $COMMIT_HASH = git rev-parse HEAD
          Add-Content -Path ".env" -Value "`nCOMMIT_HASH=$COMMIT_HASH"

      - name: Install dependencies
        run: npm ci --prefer-offline
        env:
          YOUTUBE_DL_SKIP_DOWNLOAD: true

      - name: Install yt-dlp binary manually
        shell: bash
        run: |
          mkdir -p node_modules/youtube-dl-exec/bin
          PATTERN="yt-dlp.exe"
          OUTPUT_FILE="node_modules/youtube-dl-exec/bin/yt-dlp.exe"
          MAX_ATTEMPTS=3
          ATTEMPT=1

          until gh release download --repo yt-dlp/yt-dlp --pattern "$PATTERN" --clobber --output "$OUTPUT_FILE"; do
            echo "Attempt $ATTEMPT to download yt-dlp binary failed." >&2
            if [ $ATTEMPT -ge $MAX_ATTEMPTS ]; then exit 1; fi
            ATTEMPT=$((ATTEMPT+1))
            sleep 5
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install UI dependencies
        run: npm ci --prefer-offline
        working-directory: src/ui

      - name: Update version for release
        shell: pwsh
        run: |
          $version = "${{ needs.check-release.outputs.version }}"
          if (-not $version) {
            throw "Missing version output"
          }
          npm version $version --no-git-tag-version
          Write-Host "Updated package.json version to $version"

      - name: Publish Windows app
        run: npm run publish -- --win
        env:
          NODE_ENV: production
          CI: true
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create fixed-name artifacts for stable download links
        shell: pwsh
        run: |
          $VERSION="${{ needs.check-release.outputs.version }}"
          if (-not $VERSION) {
            throw "Missing version output from 'check-release' job"
          }

          cd build
          $installer = Get-ChildItem -Filter "*Setup*.exe" |
                       Sort-Object LastWriteTime -Descending |
                       Select-Object -First 1

          if (-not $installer) {
            Write-Host "All .exe files in build directory:"
            Get-ChildItem -Filter "*.exe" | ForEach-Object { Write-Host "  $($_.Name)" }
            Write-Error "No installer file found with 'Setup' in the name"
            exit 1
          }

          $fixedName = "YakShaver-latest-Setup.exe"
          Copy-Item $installer.FullName $fixedName
          gh release upload "$VERSION" $fixedName --clobber --repo SSWConsulting/SSW.YakShaver.Desktop
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to upload $fixedName"
          }
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos-arm64:
    needs: check-release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.check-release.outputs.target }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Create .env from secrets
        env:
          MCP_CALLBACK_PORT: 8090
          MCP_AUTH_TIMEOUT_MS: 60000
          PORTAL_API_URL: https://api.yakshaver.ai/api
          PORTAL_TENANTS_URL: https://api.yakshaver.ai/tenants
          AZURE_ENTRA_APP_CLIENT_ID: ${{ secrets.AZURE_ENTRA_APP_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_AUTH_SCOPE: ${{ secrets.AZURE_AUTH_SCOPE }}
          AZURE_AUTH_CUSTOM_PROTOCOL: yakshaver-desktop
          IDENTITY_SERVER_URL: https://identity.ssw.com.au/
          IDENTITY_SERVER_CLIENT_ID: ${{ secrets.IDENTITY_SERVER_CLIENT_ID }}
          IDENTITY_SERVER_SCOPE: ${{ secrets.IDENTITY_SERVER_SCOPE }}
          IDENTITY_SERVER_CUSTOM_PROTOCOL: yakshaver-desktop
          APPLICATIONINSIGHTS_CONNECTION_STRING: ${{ secrets.APPLICATIONINSIGHTS_CONNECTION_STRING }}
        run: |
          printf "MCP_CALLBACK_PORT=%s\n" "$MCP_CALLBACK_PORT" >> .env
          printf "MCP_AUTH_TIMEOUT_MS=%s\n" "$MCP_AUTH_TIMEOUT_MS" >> .env
          printf "PORTAL_API_URL=%s\n" "$PORTAL_API_URL" >> .env
          printf "PORTAL_TENANTS_URL=%s\n" "$PORTAL_TENANTS_URL" >> .env
          printf "AZURE_ENTRA_APP_CLIENT_ID=%s\n" "$AZURE_ENTRA_APP_CLIENT_ID" >> .env
          printf "AZURE_TENANT_ID=%s\n" "$AZURE_TENANT_ID" >> .env
          printf "AZURE_AUTH_SCOPE=%s\n" "$AZURE_AUTH_SCOPE" >> .env
          printf "AZURE_AUTH_CUSTOM_PROTOCOL=%s\n" "$AZURE_AUTH_CUSTOM_PROTOCOL" >> .env
          printf "IDENTITY_SERVER_URL=%s\n" "$IDENTITY_SERVER_URL" >> .env
          printf "IDENTITY_SERVER_CLIENT_ID=%s\n" "$IDENTITY_SERVER_CLIENT_ID" >> .env
          printf "IDENTITY_SERVER_SCOPE=%s\n" "$IDENTITY_SERVER_SCOPE" >> .env
          printf "IDENTITY_SERVER_CUSTOM_PROTOCOL=%s\n" "$IDENTITY_SERVER_CUSTOM_PROTOCOL" >> .env
          printf "APPLICATIONINSIGHTS_CONNECTION_STRING=%s\n" "$APPLICATIONINSIGHTS_CONNECTION_STRING" >> .env
          COMMIT_HASH=$(git rev-parse HEAD)
          printf "COMMIT_HASH=%s\n" "$COMMIT_HASH" >> .env

      - name: Install dependencies
        run: npm ci --prefer-offline
        env:
          YOUTUBE_DL_SKIP_DOWNLOAD: true

      - name: Install yt-dlp binary manually
        run: |
          mkdir -p node_modules/youtube-dl-exec/bin
          PATTERN="yt-dlp_macos"
          OUTPUT_FILE="node_modules/youtube-dl-exec/bin/yt-dlp"
          MAX_ATTEMPTS=3
          ATTEMPT=1

          until gh release download \
            --repo yt-dlp/yt-dlp \
            --pattern "$PATTERN" \
            --clobber \
            --output "$OUTPUT_FILE"; do
            echo "Attempt $ATTEMPT to download yt-dlp binary failed." >&2
            if [ $ATTEMPT -ge $MAX_ATTEMPTS ]; then
              echo "Failed to download yt-dlp binary after $MAX_ATTEMPTS attempts." >&2
              exit 1
            fi
            ATTEMPT=$((ATTEMPT+1))
            sleep 5
          done

          chmod +x "$OUTPUT_FILE"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install UI dependencies
        run: npm ci --prefer-offline
        working-directory: src/ui

      - name: Update version for release
        run: |
          VERSION="${{ needs.check-release.outputs.version }}"
          if [[ -z "$VERSION" ]]; then
            echo "Missing version output"
            exit 1
          fi
          npm version "$VERSION" --no-git-tag-version

      - name: Build unpacked macOS arm64 app
        run: npm run package -- --mac --arm64
        env:
          NODE_ENV: production
          CI: true

      - name: Archive macOS arm64 app bundle
        run: |
          set -e
          APP_PATH=$(find build -name "YakShaver.app" -type d | head -n 1)
          if [[ -z "$APP_PATH" ]]; then
            echo "Error: Could not find arm64 YakShaver.app bundle" >&2
            exit 1
          fi
          tar -czf build/YakShaver-arm64-app.tar.gz -C "$(dirname "$APP_PATH")" "$(basename "$APP_PATH")"

      - name: Upload macOS arm64 app bundle
        uses: actions/upload-artifact@v7
        with:
          name: macos-arm64-app
          path: build/YakShaver-arm64-app.tar.gz
          retention-days: 1

  build-macos-x64:
    needs: check-release
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.check-release.outputs.target }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Create .env from secrets
        env:
          MCP_CALLBACK_PORT: 8090
          MCP_AUTH_TIMEOUT_MS: 60000
          PORTAL_API_URL: https://api.yakshaver.ai/api
          PORTAL_TENANTS_URL: https://api.yakshaver.ai/tenants
          AZURE_ENTRA_APP_CLIENT_ID: ${{ secrets.AZURE_ENTRA_APP_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_AUTH_SCOPE: ${{ secrets.AZURE_AUTH_SCOPE }}
          AZURE_AUTH_CUSTOM_PROTOCOL: yakshaver-desktop
          IDENTITY_SERVER_URL: https://identity.ssw.com.au/
          IDENTITY_SERVER_CLIENT_ID: ${{ secrets.IDENTITY_SERVER_CLIENT_ID }}
          IDENTITY_SERVER_SCOPE: ${{ secrets.IDENTITY_SERVER_SCOPE }}
          IDENTITY_SERVER_CUSTOM_PROTOCOL: yakshaver-desktop
          APPLICATIONINSIGHTS_CONNECTION_STRING: ${{ secrets.APPLICATIONINSIGHTS_CONNECTION_STRING }}
        run: |
          printf "MCP_CALLBACK_PORT=%s\n" "$MCP_CALLBACK_PORT" >> .env
          printf "MCP_AUTH_TIMEOUT_MS=%s\n" "$MCP_AUTH_TIMEOUT_MS" >> .env
          printf "PORTAL_API_URL=%s\n" "$PORTAL_API_URL" >> .env
          printf "PORTAL_TENANTS_URL=%s\n" "$PORTAL_TENANTS_URL" >> .env
          printf "AZURE_ENTRA_APP_CLIENT_ID=%s\n" "$AZURE_ENTRA_APP_CLIENT_ID" >> .env
          printf "AZURE_TENANT_ID=%s\n" "$AZURE_TENANT_ID" >> .env
          printf "AZURE_AUTH_SCOPE=%s\n" "$AZURE_AUTH_SCOPE" >> .env
          printf "AZURE_AUTH_CUSTOM_PROTOCOL=%s\n" "$AZURE_AUTH_CUSTOM_PROTOCOL" >> .env
          printf "IDENTITY_SERVER_URL=%s\n" "$IDENTITY_SERVER_URL" >> .env
          printf "IDENTITY_SERVER_CLIENT_ID=%s\n" "$IDENTITY_SERVER_CLIENT_ID" >> .env
          printf "IDENTITY_SERVER_SCOPE=%s\n" "$IDENTITY_SERVER_SCOPE" >> .env
          printf "IDENTITY_SERVER_CUSTOM_PROTOCOL=%s\n" "$IDENTITY_SERVER_CUSTOM_PROTOCOL" >> .env
          printf "APPLICATIONINSIGHTS_CONNECTION_STRING=%s\n" "$APPLICATIONINSIGHTS_CONNECTION_STRING" >> .env
          COMMIT_HASH=$(git rev-parse HEAD)
          printf "COMMIT_HASH=%s\n" "$COMMIT_HASH" >> .env

      - name: Install dependencies
        run: npm ci --prefer-offline
        env:
          YOUTUBE_DL_SKIP_DOWNLOAD: true
          npm_config_arch: x64

      - name: Rebuild native modules for x64
        run: npx electron-rebuild -f -w better-sqlite3 --arch x64

      - name: Install yt-dlp binary manually
        run: |
          mkdir -p node_modules/youtube-dl-exec/bin
          PATTERN="yt-dlp_macos"
          OUTPUT_FILE="node_modules/youtube-dl-exec/bin/yt-dlp"
          MAX_ATTEMPTS=3
          ATTEMPT=1

          until gh release download \
            --repo yt-dlp/yt-dlp \
            --pattern "$PATTERN" \
            --clobber \
            --output "$OUTPUT_FILE"; do
            echo "Attempt $ATTEMPT to download yt-dlp binary failed." >&2
            if [ $ATTEMPT -ge $MAX_ATTEMPTS ]; then
              echo "Failed to download yt-dlp binary after $MAX_ATTEMPTS attempts." >&2
              exit 1
            fi
            ATTEMPT=$((ATTEMPT+1))
            sleep 5
          done

          chmod +x "$OUTPUT_FILE"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install UI dependencies
        run: npm ci --prefer-offline
        working-directory: src/ui

      - name: Update version for release
        run: |
          VERSION="${{ needs.check-release.outputs.version }}"
          if [[ -z "$VERSION" ]]; then
            echo "Missing version output"
            exit 1
          fi
          npm version "$VERSION" --no-git-tag-version

      - name: Build unpacked macOS x64 app
        run: npm run package -- --mac --x64
        env:
          NODE_ENV: production
          CI: true

      - name: Verify x64 architecture of built app
        run: |
          set -e
          APP_PATH=$(find build -name "YakShaver.app" -type d | head -n 1)
          if [[ -z "$APP_PATH" ]]; then
            echo "Error: Could not find x64 YakShaver.app bundle" >&2
            exit 1
          fi

          BINARY="$APP_PATH/Contents/MacOS/YakShaver"
          ARCH_INFO=$(file "$BINARY")
          echo "Binary architecture: $ARCH_INFO"
          if ! echo "$ARCH_INFO" | grep -q "x86_64"; then
            echo "❌ ERROR: Binary is NOT x86_64!"
            exit 1
          fi

      - name: Archive macOS x64 app bundle
        run: |
          set -e
          APP_PATH=$(find build -name "YakShaver.app" -type d | head -n 1)
          if [[ -z "$APP_PATH" ]]; then
            echo "Error: Could not find x64 YakShaver.app bundle" >&2
            exit 1
          fi
          tar -czf build/YakShaver-x64-app.tar.gz -C "$(dirname "$APP_PATH")" "$(basename "$APP_PATH")"

      - name: Upload macOS x64 app bundle
        uses: actions/upload-artifact@v7
        with:
          name: macos-x64-app
          path: build/YakShaver-x64-app.tar.gz
          retention-days: 1

  package-macos-universal:
    needs:
      - check-release
      - build-macos-arm64
      - build-macos-x64
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.check-release.outputs.target }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline
        env:
          YOUTUBE_DL_SKIP_DOWNLOAD: true

      - name: Download macOS arm64 app bundle
        uses: actions/download-artifact@v8
        with:
          name: macos-arm64-app
          path: artifacts/macos-arm64/

      - name: Download macOS x64 app bundle
        uses: actions/download-artifact@v8
        with:
          name: macos-x64-app
          path: artifacts/macos-x64/

      - name: Extract macOS app bundles
        run: |
          set -e
          mkdir -p artifacts/macos-arm64-app artifacts/macos-x64-app
          tar -xzf artifacts/macos-arm64/YakShaver-arm64-app.tar.gz -C artifacts/macos-arm64-app
          tar -xzf artifacts/macos-x64/YakShaver-x64-app.tar.gz -C artifacts/macos-x64-app

      - name: Update version for release
        run: |
          VERSION="${{ needs.check-release.outputs.version }}"
          if [[ -z "$VERSION" ]]; then
            echo "Missing version output"
            exit 1
          fi
          npm version "$VERSION" --no-git-tag-version

      - name: Merge universal macOS app
        run: |
          set -e
          ARM64_APP=$(find artifacts/macos-arm64-app -name "YakShaver.app" -type d | head -n 1)
          X64_APP=$(find artifacts/macos-x64-app -name "YakShaver.app" -type d | head -n 1)

          if [[ -z "$ARM64_APP" || -z "$X64_APP" ]]; then
            echo "Error: Missing architecture-specific app bundles to merge" >&2
            exit 1
          fi

          ARM64_APP=$(cd "$(dirname "$ARM64_APP")" && pwd)/"$(basename "$ARM64_APP")"
          X64_APP=$(cd "$(dirname "$X64_APP")" && pwd)/"$(basename "$X64_APP")"
          UNIVERSAL_APP="$PWD/build/macos-universal/YakShaver.app"

          mkdir -p "$PWD/build/macos-universal"

          ARM64_APP_PATH="$ARM64_APP" X64_APP_PATH="$X64_APP" UNIVERSAL_APP_PATH="$UNIVERSAL_APP" node --input-type=module <<'EOF'
          import { makeUniversalApp } from "@electron/universal";

          await makeUniversalApp({
            x64AppPath: process.env.X64_APP_PATH,
            arm64AppPath: process.env.ARM64_APP_PATH,
            outAppPath: process.env.UNIVERSAL_APP_PATH,
          });
          EOF

      - name: Package universal macOS release
        run: |
          set -e
          npm exec electron-builder -- \
            --config electron-builder.config.js \
            --mac \
            --universal \
            --prepackaged "$PWD/build/macos-universal/YakShaver.app" \
            --publish always \
            -c.mac.artifactName='${productName}-${version}-${arch}-mac.${ext}'
        env:
          NODE_ENV: production
          CI: true
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload fixed-name macOS download links
        run: |
          set -e
          VERSION="${{ needs.check-release.outputs.version }}"
          if [[ -z "$VERSION" ]]; then
            echo "Error: Missing version output from 'check-release' job." >&2
            exit 1
          fi

          cd build
          DMG_UNIVERSAL=$(find . -name "YakShaver-*-universal-mac.dmg" -type f | head -n 1)
          if [[ -z "$DMG_UNIVERSAL" ]]; then
            echo "Error: No universal macOS DMG found" >&2
            exit 1
          fi

          for fixed_name in YakShaver-latest-mac.dmg YakShaver-latest-arm64.dmg YakShaver-latest-x64.dmg; do
            cp "$DMG_UNIVERSAL" "$fixed_name"
            gh release upload "$VERSION" "$fixed_name" --clobber --repo SSWConsulting/SSW.YakShaver.Desktop
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
