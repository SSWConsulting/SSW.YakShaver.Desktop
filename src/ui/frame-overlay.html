<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Screen Frame Overlay</title>
  <style>
    /* Googly eyes styles */
    .googly-eyes-container {
      position: fixed;
      bottom: 36px;
      right: 7px;
      width: 80px;
      height: 40px;
      z-index: 10002;
      display: flex;
      gap: 2px;
      pointer-events: none;
      display: none;
    }

    .eye {
      width: 24px;
      height: 18px;
      background: #fff;
      border-radius: 50%;
      border: 2px solid #222;
      position: relative;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
    }

    .pupil {
      width: 12px;
      height: 12px;
      background: #222;
      border-radius: 50%;
      position: absolute;
      top: 6px;
      left: 2px;
      transition: all 0.2s;
    }

    .eyelid {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #f3a260;
      border-radius: 50%;
      z-index: 2;
      animation: blink 4s infinite;
      opacity: 0;
    }

    .eye.right .eyelid {
      animation-delay: 2s;
    }

    @keyframes blink {

      0%,
      90%,
      100% {
        opacity: 0;
      }

      92%,
      98% {
        opacity: 1;
      }
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    #frame {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      border: 8px solid hsl(0, 60%, 50%);
      box-sizing: border-box;
      /* animation: pulse-frame 1.2s infinite; */
    }

    /* April Fools: Blue border */
    .april-fools {
      border-color: hsl(220, 80%, 60%) !important;
    }

    @keyframes pulse-frame {
      0% {
        border-color: hsl(0, 60%, 20%);
        /* SSW Red */
        box-shadow: 0 0 0 0 hsla(0, 60%, 50%, 0.5);
      }

      50% {
        border-color: hsl(0, 80%, 70%);
        box-shadow: 0 0 24px 8px hsla(0, 60%, 50%, 0.35);
      }

      100% {
        border-color: hsl(0, 60%, 20%);
        box-shadow: 0 0 0 0 hsla(0, 60%, 50%, 0.5);
      }
    }
  </style>
</head>

<body>
  <div id="frame"></div>
  <div id="googly-eyes" class="googly-eyes-container">
    <div class="eye left">
      <div class="pupil"></div>
      <div class="eyelid"></div>
    </div>
    <div class="eye right">
      <div class="pupil"></div>
      <div class="eyelid"></div>
    </div>
  </div>
  <img id="adam-cogan-img" src="/background/adam-cogan.png" alt="Adam Cogan"
    style="position: fixed; bottom: 8px; right: 12px; width: 120px; height: auto; z-index: 10001; pointer-events: none; display: none;" />
  <script>

    const today = new Date();
    if (today.getMonth() === 3 - 1 && today.getDate() === 1 || true) {
      document.getElementById('frame').classList.add('april-fools');
      document.getElementById('adam-cogan-img').style.display = 'block';
      document.getElementById('googly-eyes').style.display = 'flex';
    }
  </script>
</body>

</html>
