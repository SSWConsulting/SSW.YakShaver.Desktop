<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Screen Frame Overlay</title>
  <style>
    html,
    body {
      width: 100vw;
      height: 100vh;
      margin: 0;
      padding: 0;
      background: transparent;
      overflow: hidden;
    }

    #frame {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      border: 8px solid #cc4141;
      box-sizing: border-box;
    }
  </style>
</head>

<body>
  <div id="frame"></div>
</body>

</html>
