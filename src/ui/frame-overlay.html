<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Screen Frame Overlay</title>
  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    #frame {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      border: 8px solid hsl(0, 60%, 50%);
      box-sizing: border-box;
      animation: pulse-frame 1.2s infinite;
    }

    @keyframes pulse-frame {
      0% {
        border-color: hsl(0, 60%, 20%);
        /* SSW Red */
        box-shadow: 0 0 0 0 hsla(0, 60%, 50%, 0.5);
      }

      50% {
        border-color: hsl(0, 80%, 70%);
        box-shadow: 0 0 24px 8px hsla(0, 60%, 50%, 0.35);
      }

      100% {
        border-color: hsl(0, 60%, 20%);
        box-shadow: 0 0 0 0 hsla(0, 60%, 50%, 0.5);
      }
    }
  </style>
</head>

<body>
  <div id="frame"></div>
</body>

</html>
